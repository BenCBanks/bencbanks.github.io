<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% if page.title %}
  <title>{{ page.title }} — {{ site.title }}</title>
  {% else %}
  <title>{{ site.title }}</title>
  {% endif %}
  <meta name="description" content="{{ page.description | default: site.description | strip_html | normalize_whitespace | truncate: 160 }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ site.url }}/feed.xml">
  {% seo %}
  {% if jekyll.environment == "production" %}
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZBXQJD05EF"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-ZBXQJD05EF');
  </script>
  {% endif %}
</head>
<body>

<header class="site-header">
  <nav class="site-nav" role="navigation" aria-label="Main navigation">
    <a href="{{ '/' | relative_url }}" class="site-logo" aria-label="{{ site.title }}">
      <span class="logo-mark" aria-hidden="true">BB</span>
      <span class="logo-text">Ben</span>
    </a>
    <ul class="nav-links">
      <li><a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active" aria-current="page"{% endif %}>Projects</a></li>
      <li><a href="{{ '/about/' | relative_url }}"{% if page.url contains '/about' %} class="active" aria-current="page"{% endif %}>About</a></li>
      <li><a href="{{ '/contact/' | relative_url }}"{% if page.url contains '/contact' %} class="active" aria-current="page"{% endif %}>Contact</a></li>
    </ul>
  </nav>
</header>

<main class="site-main" id="main-content">
  {{ content }}
</main>

<footer class="site-footer">
  <div class="footer-inner">
    <p>Ben Banks &middot; <a href="mailto:Ben@theBanks.io">Ben@theBanks.io</a> &middot; <a href="https://www.linkedin.com/in/benjamin-banks" target="_blank" rel="noopener noreferrer">LinkedIn</a></p>
  </div>
</footer>

</body>
</html>
