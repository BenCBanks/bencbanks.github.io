---
layout: default
---
<div class="about-intro">
  {% if page.image %}
  <img src="{{ page.image | relative_url }}" alt="Ben Banks" class="about-photo">
  {% endif %}

  <div class="about-bio">
    <h1>Ben Banks</h1>
    {{ content }}

    <div class="about-actions">
      <a href="{{ page.resume | default: '/assets/img/Ben_Banks_Resume.pdf' }}" class="btn-download" target="_blank" rel="noopener noreferrer">
        Download Resume
      </a>
    </div>
  </div>
</div>

{% if page.timeline %}
<div class="timeline">
  <p class="timeline-heading">Experience</p>
  <ul class="timeline-list">
    {% for item in page.timeline %}
    <li class="timeline-item">
      <span class="timeline-year">{{ item.years }}</span>
      <div>
        <div class="timeline-role">{{ item.role }}</div>
        <div class="timeline-org">{{ item.org }}</div>
      </div>
    </li>
    {% endfor %}
  </ul>
</div>
{% endif %}
